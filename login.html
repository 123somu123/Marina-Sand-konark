<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register | Marina Bay Sands</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #78350f, #b45309);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .container {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: #6b7280;
    }
    .tab-btn.active {
      color: #b45309;
      border-bottom: 3px solid #b45309;
      background: #fffbeb;
    }
    .form-panel {
      padding: 2rem;
      display: none;
    }
    .form-panel.active {
      display: block;
    }
    h2 {
      color: #78350f;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
      text-align: center;
    }
    .input-group {
      margin-bottom: 1.25rem;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #374151;
    }
    .input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #b45309;
      box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.1);
    }
    .btn-submit {
      width: 100%;
      background: #b45309;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-submit:hover {
      background: #78350f;
    }
    .message {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.875rem;
      padding: 0.5rem;
      border-radius: 0.5rem;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
    }
    .success {
      background: #dcfce7;
      color: #166534;
    }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: #b45309;
      text-decoration: none;
      font-weight: 500;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab-btn active" id="tabLogin">Login</button>
    <button class="tab-btn" id="tabRegister">Register</button>
  </div>

  <!-- Login Form -->
  <div id="loginPanel" class="form-panel active">
    <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
    <form id="loginForm">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="loginUsername" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required>
      </div>
      <button type="submit" class="btn-submit">Login</button>
      <div id="loginMessage" class="message"></div>
    </form>
  </div>

  <!-- Register Form -->
  <div id="registerPanel" class="form-panel">
    <h2><i class="fas fa-user-plus"></i> Create Account</h2>
    <form id="registerForm">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="regUsername" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="regPassword" required>
      </div>
      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirmPassword" required>
      </div>
      <button type="submit" class="btn-submit">Register</button>
      <div id="registerMessage" class="message"></div>
    </form>
  </div>

  <div class="back-link">
    <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
  </div>
</div>

<script>
  // Initialize users in localStorage if not present
  function initializeUsers() {
    let users = localStorage.getItem('users');
    if (!users) {
      // Default admin user
      const defaultUsers = {
        "admin": "admin123",
        "user": "password"
      };
      localStorage.setItem('users', JSON.stringify(defaultUsers));
    }
  }
  initializeUsers();

  // Helper to show message
  function showMessage(element, text, isError = true) {
    element.textContent = text;
    element.className = `message ${isError ? 'error' : 'success'}`;
    setTimeout(() => {
      element.textContent = '';
      element.className = 'message';
    }, 3000);
  }

  // Login form handler
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const messageDiv = document.getElementById('loginMessage');

    const users = JSON.parse(localStorage.getItem('users'));
    if (users[username] && users[username] === password) {
      // Store logged in user
      localStorage.setItem('loggedInUser', username);
      showMessage(messageDiv, 'Login successful! Redirecting...', false);
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    } else {
      showMessage(messageDiv, 'Invalid username or password', true);
    }
  });

  // Register form handler
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    const messageDiv = document.getElementById('registerMessage');

    if (!username || !password) {
      showMessage(messageDiv, 'Username and password are required', true);
      return;
    }
    if (password !== confirm) {
      showMessage(messageDiv, 'Passwords do not match', true);
      return;
    }
    const users = JSON.parse(localStorage.getItem('users'));
    if (users[username]) {
      showMessage(messageDiv, 'Username already exists', true);
      return;
    }
    // Add new user
    users[username] = password;
    localStorage.setItem('users', JSON.stringify(users));
    showMessage(messageDiv, 'Registration successful! Please login.', false);
    // Clear form
    document.getElementById('regUsername').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirmPassword').value = '';
    // Switch to login tab after a short delay
    setTimeout(() => {
      document.getElementById('tabLogin').click();
    }, 1500);
  });

  // Tab switching
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const loginPanel = document.getElementById('loginPanel');
  const registerPanel = document.getElementById('registerPanel');

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
    loginPanel.classList.add('active');
    registerPanel.classList.remove('active');
  });

  tabRegister.addEventListener('click', () => {
    tabRegister.classList.add('active');
    tabLogin.classList.remove('active');
    registerPanel.classList.add('active');
    loginPanel.classList.remove('active');
  });
</script>
</body>
</html>
